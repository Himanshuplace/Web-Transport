<!DOCTYPE html>
<!--
  index.html — Cricket Score Engine
  Script load order (dependency chain):
    1. protocol.js         MSG constants + encode/decode
    2. store.js            CricketStore
    3. transport-client.js WebTransport connection
    4. ui.js               DOM render functions
    5. app.js              wires everything together
-->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Live · WebTransport</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="wt-unsupported">
  <strong>WebTransport not supported</strong>
  Requires Chrome 97+ or Edge 97+ over HTTPS or localhost.
</div>

<div id="app" class="app-shell">

  <header class="header">
    <div class="header-left">
      <span class="header-logo">🏏</span>
      <span class="header-title">Cricket Live</span>
      <span class="header-sub">WebTransport · HTTP/3</span>
    </div>
    <div class="header-right">
      <span id="connection-status" class="connection-status status-connecting">
        <span class="status-dot"></span>Connecting
      </span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        ☀
      </button>
    </div>
  </header>

  <div id="match-tabs"></div>

  <div class="main-content">

    <div class="scorecard-panel">
      <div id="scorecard">
        <div class="loading">Connecting to live scores…</div>
      </div>
      <div id="fall-of-wickets-wrap">
        <div class="panel-heading-inline" id="fow-heading" style="padding:10px 14px 4px; display:none">
          Fall of Wickets
        </div>
        <div id="fall-of-wickets"></div>
      </div>
    </div>

    <div class="commentary-panel">
      <div class="panel-heading">Commentary</div>
      <div id="commentary-feed">
        <div class="commentary-item commentary-normal">Waiting for match data…</div>
      </div>
    </div>

  </div>
</div>

<script src="js/protocol.js"></script>
<script src="js/store.js"></script>
<script src="js/transport-client.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
  (function () {
    var html = document.documentElement;
    var btn  = document.getElementById('theme-toggle');
    var KEY  = 'cricket-theme';

    var saved   = localStorage.getItem(KEY);
    var prefer  = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    apply(saved || prefer);

    btn.addEventListener('click', function () {
      var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      apply(next);
      localStorage.setItem(KEY, next);
    });

    function apply(theme) {
      html.dataset.theme = theme;
      btn.textContent    = theme === 'dark' ? '☀' : '☾';
      btn.title          = theme === 'dark' ? 'Light mode' : 'Dark mode';
    }
  })();
</script>

</body>
</html>
